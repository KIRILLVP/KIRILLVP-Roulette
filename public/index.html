<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KIRILLVP ROULETTE</title>
    <link rel="icon" type="image/jpeg" href="KGlogo.jpg">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; background: #000; color: white; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 200px; border: 2px solid #0f0; border-radius: 10px; z-index: 10; transform: scaleX(-1); }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; text-shadow: 2px 2px 4px #000; }
        #online { font-size: 18px; color: #0f0; }
        #locationInfo { font-size: 22px; font-weight: bold; margin-top: 5px; color: #fff; }

        #volumeContainer { 
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); 
            z-index: 10; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        input[type=range] { cursor: pointer; accent-color: #0f0; }

        #buttons { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 20px; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .start-btn { background: #0f0; color: #000; }
        .next-btn { background: #ff4444; color: #fff; display: none; }
        .stop-btn { background: #555; color: #fff; display: none; }

        button:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }
        button:hover:not(:disabled) { transform: scale(1.05); }
        #statusText { margin-top: 10px; font-style: italic; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="online"><span id="txt-online">Онлайн</span>: <span id="count">0</span></div>
        <div id="locationInfo"><span id="txt-partner">Собеседник</span>: ...</div>
        <div id="statusText">...</div>
    </div>

    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>

    <div id="volumeContainer">
        <span id="txt-volume">Звук:</span>
        <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="1">
    </div>

    <div id="buttons">
        <button id="startBtn" class="start-btn" onclick="pressStart()" disabled>...</button>
        <button id="nextBtn" class="next-btn" onclick="nextPartner()"></button>
        <button id="stopBtn" class="stop-btn" onclick="stopChat()"></button>
    </div>

    <script>
        // --- ЛОКАЛИЗАЦИЯ ---
        const translations = {
            ru: {
                online: "Онлайн",
                partner: "Собеседник",
                volume: "Звук",
                start: "ИСКАТЬ",
                loading: "ЗАГРУЗКА...",
                next: "СЛЕДУЮЩИЙ (Esc)",
                stop: "ЗАВЕРШИТЬ",
                ready: "Готов к поиску",
                searching: "Поиск собеседника...",
                connecting: "Подключение...",
                inChat: "В беседе",
                errorCam: "Ошибка: Доступ к камере запрещен!",
                noPartners: "Сейчас нет свободных собеседников. Подождите или попробуйте позже.",
                partnerLeft: "Собеседник покинул чат",
                partnerDisconnected: "Собеседник отключился (проблемы с сетью)",
                switched: "Вас переключили на другого пользователя"
            },
            en: {
                online: "Online",
                partner: "Partner",
                volume: "Volume",
                start: "SEARCH",
                loading: "LOADING...",
                next: "NEXT (Esc)",
                stop: "STOP",
                ready: "Ready to search",
                searching: "Searching for partner...",
                connecting: "Connecting...",
                inChat: "In conversation",
                errorCam: "Error: Camera access denied!",
                noPartners: "No free partners available. Please wait or try later.",
                partnerLeft: "Partner left the chat",
                partnerDisconnected: "Partner disconnected (network issues)",
                switched: "You were switched to another user"
            }
        };

        // Определяем язык (если не русский — ставим английский)
        const userLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
        const t = translations[userLang];

        // Применяем переводы к статичным элементам
        document.getElementById('txt-online').innerText = t.online;
        document.getElementById('txt-partner').innerText = t.partner;
        document.getElementById('txt-volume').innerText = t.volume;
        document.getElementById('startBtn').innerText = t.loading;
        document.getElementById('nextBtn').innerText = t.next;
        document.getElementById('stopBtn').innerText = t.stop;

        // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
        const socket = io();
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stopBtn = document.getElementById('stopBtn');
        const locationInfo = document.getElementById('locationInfo');
        const remoteVideo = document.getElementById('remoteVideo');
        const volumeControl = document.getElementById('volumeControl');

        let myStream;
        let currentCall;
        let myLocation = "Earth";
        let waitingCount = 0;

        const peer = new Peer({
            host: location.hostname,
            port: location.port || (location.protocol === 'https:' ? 443 : 80),
            path: '/peerjs/myapp',
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { 
                        urls: 'turn:openrelay.metered.ca:443',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ]
            }
        });

        peer.on('open', (id) => {
            if (myStream) {
                startBtn.disabled = false;
                startBtn.innerText = t.start;
                statusText.innerText = t.ready;
            }
        });

        async function getLocation() {
            try {
                const res = await fetch('https://ipwho.is/');
                const data = await res.json();
                if (data.success) myLocation = `${data.city}, ${data.country}`;
            } catch (e) { console.log("Location default"); }
        }
        getLocation();

        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            myStream = stream;
            document.getElementById('localVideo').srcObject = stream;
            if (peer.id) {
                startBtn.disabled = false;
                startBtn.innerText = t.start;
                statusText.innerText = t.ready;
            }
        }).catch(() => {
            statusText.innerText = t.errorCam;
        });

        volumeControl.addEventListener('input', (e) => {
            remoteVideo.volume = e.target.value;
        });

        peer.on('call', call => {
            currentCall = call;
            call.answer(myStream);
            call.on('stream', remoteStream => { 
                remoteVideo.srcObject = remoteStream;
                statusText.innerText = t.inChat;
            });
        });

        socket.on('updateOnline', data => {
            document.getElementById('count').innerText = data.total;
            waitingCount = data.waiting;
        });

        socket.on('partnerFound', (data) => {
            locationInfo.innerHTML = `${t.partner}: ${data.location}`;
            statusText.innerText = t.connecting;
            const call = peer.call(data.peerId, myStream);
            currentCall = call;
            call.on('stream', remoteStream => { 
                remoteVideo.srcObject = remoteStream;
                statusText.innerText = t.inChat;
            });
        });

        socket.on('partnerLeft', (data) => {
            if (data && data.reason) {
                // Переводим причину, если она пришла в виде ключа
                let msg = data.reason;
                if (msg.includes('switched')) msg = t.switched;
                else if (msg.includes('left')) msg = t.partnerLeft;
                else if (msg.includes('disconnected')) msg = t.partnerDisconnected;
                
                alert(msg);
            }
            resetToMenu();
        });

        function pressStart() {
            if (!myStream || !peer.id) return;
            showChatUI();
            statusText.innerText = t.searching;
            socket.emit('findPartner', { peerId: peer.id, location: myLocation });
        }

        function nextPartner() {
            if (waitingCount === 0) {
                alert(t.noPartners);
                return;
            }
            socket.emit('requestDisconnect', { reason: 'switched' });
            setTimeout(() => {
                showChatUI();
                statusText.innerText = t.searching;
                socket.emit('findPartner', { peerId: peer.id, location: myLocation });
            }, 100);
        }

        function stopChat() {
            socket.emit('requestDisconnect', { reason: 'left' });
        }

        function showChatUI() {
            startBtn.style.display = "none";
            nextBtn.style.display = "block";
            stopBtn.style.display = "block";
        }

        function resetToMenu() {
            if (currentCall) currentCall.close();
            remoteVideo.srcObject = null;
            locationInfo.innerHTML = `${t.partner}: ...`;
            statusText.innerText = t.ready;
            
            startBtn.style.display = "block";
            nextBtn.style.display = "none";
            stopBtn.style.display = "none";
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && nextBtn.style.display === "block") nextPartner();
        });
    </script>
</body>
</html>
